name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.PORT }} -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa -p ${{ secrets.PORT }} ${{ secrets.USERNAME }}@${{ secrets.HOST }} << 'EOF'
            set -e

            cd ${{ secrets.TARGET_DIR }}

            git config --global --add safe.directory ${{ secrets.TARGET_DIR }}

            git fetch origin
            git checkout main
            git pull origin main

            php artisan down || true

            trap 'php artisan up || true' EXIT

            composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

            npm ci
            npm run build

            php artisan migrate --force

            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            chown -R forge:www-data storage bootstrap/cache
            chmod -R 775 storage bootstrap/cache

            php artisan queue:restart

            sudo systemctl daemon-reload
            sudo systemctl restart pischeprom-mail-sync-worker

            php artisan up

            trap - EXIT
          EOF
