name: Deploy to VPS

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.PORT }} -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa -p ${{ secrets.PORT }} ${{ secrets.USERNAME }}@${{ secrets.HOST }} << 'EOF'
            set -e

            cd ${{ secrets.TARGET_DIR }}

            git config --global --add safe.directory ${{ secrets.TARGET_DIR }}

            git checkout -- bootstrap/ssr public/sitemap.xml storage bootstrap/cache || true
            git clean -fd bootstrap/ssr || true

            git fetch origin
            git checkout main
            git pull --ff-only origin main

            php artisan down || true

            trap 'php artisan up || true' EXIT

            composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

            df -h /
            free -m

            rm -rf node_modules

            if ! swapon --show=NAME --noheadings | grep -q '^/swapfile$' && [ "$(df --output=avail -m / | tail -1)" -gt 1400 ]; then
              sudo fallocate -l 1G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=1024
              sudo chmod 600 /swapfile
              sudo mkswap /swapfile
              sudo swapon /swapfile
            fi

            npm ci --no-audit --no-fund
            rm -rf bootstrap/ssr
            NODE_OPTIONS="--max-old-space-size=768" npm run build
            rm -rf node_modules

            php artisan migrate --force

            php artisan optimize:clear
            php artisan route:list --path=Ameise/commercial-offers
            php artisan route:list --path=unisender-go
            php artisan route:list --path=unsubscribe
            php artisan list mailings

            if ! php artisan beeline:sync-calls --period=today --limit=500; then
              echo "::warning::Beeline call sync failed during deploy; deployment continues."
            fi
            if ! php artisan beeline:rebuild-calls --limit=2000; then
              echo "::warning::Beeline call rebuild failed during deploy; deployment continues."
            fi

            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            chown -R forge:www-data storage bootstrap/cache
            chmod -R 775 storage bootstrap/cache

            php artisan queue:restart

            sudo systemctl daemon-reload
            sudo systemctl restart pischeprom-mail-sync-worker
            sudo systemctl restart pischeprom-ssr

            sleep 2
            php artisan inertia:check-ssr

            php artisan up
            php artisan app:deploy-smoke --path=/

            trap - EXIT
          EOF
