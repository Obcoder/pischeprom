name: Debug VPS

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.PORT }} -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Inspect purchases endpoint
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa -p ${{ secrets.PORT }} ${{ secrets.USERNAME }}@${{ secrets.HOST }} << 'EOF'
            set -e

            cd ${{ secrets.TARGET_DIR }}

            php artisan tinker --execute='
              try {
                $request = Illuminate\Http\Request::create("/api/purchases", "GET", ["page" => 1, "per_page" => 100]);
                $controller = app(App\Http\Controllers\API\PurchaseController::class);
                $response = $controller->index($request)->response();
                dump($response->getStatusCode());
                dump($response->getData(true)["meta"]["per_page"] ?? null);
              } catch (Throwable $e) {
                fwrite(STDERR, get_class($e).": ".$e->getMessage().PHP_EOL);
                fwrite(STDERR, $e->getTraceAsString().PHP_EOL);
                exit(1);
              }
            '

            tail -n 160 storage/logs/laravel.log
          EOF
